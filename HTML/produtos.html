<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Estoque</title>
    <link rel="stylesheet" href="../CSS/produtos.css">
    <link rel="stylesheet" href="../CSS/filtro.css">
</head>

<body>

    <!-- LOGO -->

    <div class="logo-wrapper">
        <img src="../fotos/logo.png" alt="Logo J-Car" class="logo">
    </div>

    <!-- Coluna esquerda -->


    <div class="layout">
        <div class="filtro2">

            <table class="filtro">
                <tr class="tfiltro">
                    <th colspan="2" height="78px">Filtros</th>
                </tr>

                <tr>
                    <td height="55px" class="pop">Preço</td>
                    <td>
                        <select>
                            <option>Todos</option>
                            <option>Até 300.000</option>
                            <option>300.000 - 600.000</option>
                            <option>Acima de 600.000</option>
                        </select>
                    </td>
                </tr>

                <tr>
                    <td height="60px" class="pop">Categoria</td>
                    <td>
                        <select>
                            <option>Todas</option>
                            <option>sedan</option>
                            <option>SUV</option>
                            <option>Hatch</option>
                        </select>
                    </td>
                </tr>

                <tr>
                    <td height="60px" class="pop">Carros</td>
                    <td>
                        <input type="texte" placeholder="Ex: BMW">
                    </td>
                </tr>

                <tr>
                    <td height="60px" class="pop">Modelo</td>
                    <td>
                        <input type="text" placeholder="ex: AMG">
                    </td>
                </tr>


                <tr>
                    <td height="55px" class="pop">Ano</td>
                    <td>
                        <select>
                            <option>2024</option>
                            <option>2025</option>
                            <option>2026</option>
                        </select>

                    </td>
                </tr>



                <tr>
                    <td colspan="2" align="center" height="80px">
                        <button id="btnAbrirModal"
                            style="background: #2563eb; color: white; width: 85%; padding: 14px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 15px; transition: 0.3s; box-shadow: 0 4px 6px rgba(0,0,0,0.1);">
                            + Cadastrar Novo Carro
                        </button>
                    </td>
                </tr>

                <tr>
                    <td colspan="2" align="center" height="60px">
                        <a href="menu.html" class="botao-voltar"> ← Voltar</a>
                    </td>
                </tr>

            </table>




        </div>

        <!-- Tabela do nosso estoque -->



        <table class="table">
            <tr class="itens">
                <th class="i1" height="78px">Imagem</th>
                <th>Marca</th>
                <th>Modelo</th>
                <th>Ano</th>
                <th>Categoria</th>
                <th class="v1">Valor</th>
                <th>Cor</th>
                <th>&nbsp;</th>
                <th>&nbsp;</th>
            </tr>

            <tbody id="corpoTabelaCarros">
            </tbody>
        </table>

    </div>
    </div>
    <div id="modalCadastro" class="modal-fundo">
        <div class="modal-conteudo">
            <span id="btnFecharModal" class="fechar-modal">&times;</span>
            <h2 style="margin-top: 0; color: #111827;">Cadastrar Novo Veículo</h2>

            <form id="formCadastrarCarro">
                <label>Marca:</label>
                <input type="text" id="cadMarca" required placeholder="Ex: Porsche">

                <label>Modelo:</label>
                <input type="text" id="cadModelo" required placeholder="Ex: 911 Carrera">

                <label>Ano:</label>
                <input type="number" id="cadAno" required placeholder="Ex: 2026">

                <label>Preço:</label>
                <input type="number" step="0.01" id="cadPreco" required placeholder="Ex: 850000.00">

                <label>Cor:</label>
                <input type="text" id="cadCor" placeholder="Ex: Prata">

                <button type="submit" class="btn-salvar">Salvar Carro no Banco</button>
            </form>
        </div>
    </div>

    <script src="../js/produtos.js"></script>
</body>

</html>
